# collection-reverse-lookup configuration
#
# Edit this file, then run `rake build_embeddings` to (re)generate the search
# data. The build exports these settings to docs/data/manifest.json, and the
# search page configures itself from that manifest — no page edits needed.

# Which embedding model to use. One of:
#   clip      - CLIP ViT-B/32 (demo default). Best when user uploads differ
#               in kind from the collection (photos or embossed impressions
#               vs. inked scans) — it abstracts to shape rather than
#               appearance. Largest download (~85 MB). 512-dim.
#   dinov2    - DINOv2-small. Strongest same-domain retrieval (scans/copies
#               of collection-like images) with a much smaller download
#               (~24 MB), but weaker across modalities. 384-dim.
#   mobilenet - MobileCLIP-S0 (MobileNet-family image encoder). Smallest and
#               fastest download, but much less robust to crops/rotation in
#               uploaded queries (see README eval results). 512-dim.
model: clip

# Image preprocessing profile, applied identically at build time and to user
# uploads in the browser. One of:
#   standard - flatten transparency to white, pad to square.
#   lineart  - flatten to white, grayscale, contrast stretch, pad to square.
#   binary   - lineart steps, then Otsu-threshold to pure black-on-white
#              (demo default). Collapses inked scans, photos, and embossed
#              impressions of a mark into one representation — the best for
#              cross-domain queries against high-contrast material. Avoid
#              for collections of photographs or continuous-tone images.
preprocessing: binary

# Collection inputs.
objects_dir: docs/objects
metadata_csv: docs/metadata/cb-pmcarchive.csv

# CSV column that holds each image's filename (used to join metadata).
filename_field: filename

# Where generated artifacts are written. The search page expects to find
# them at data/ relative to itself.
output_dir: docs/data

# Default number of results the search page shows.
top_k: 12
